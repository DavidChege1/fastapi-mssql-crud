<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Employee Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="header-content">
                <div class="logo">HR <span>Dashboard</span></div>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=HR+Admin&background=3b82f6&color=fff" alt="Admin">
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="content-header">
                <div>
                    <h1>Employee Operations</h1>
                    <p class="subtitle">Manage company workforce, salaries, and departments.</p>
                </div>
                <button class="btn btn-primary" onclick="openModal('addEmployeeModal')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    Add Employee
                </button>
            </div>

            <div class="stats-grid">
                <div class="stat-card glass-card">
                    <div class="stat-icon blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></div>
                    <div class="stat-details">
                        <p class="stat-label">Total Employees</p>
                        <h3 class="stat-value" id="totalCount">0</h3>
                    </div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon emerald"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></div>
                    <div class="stat-details">
                        <p class="stat-label">Avg. Salary</p>
                        <h3 class="stat-value" id="avgSalary">$0</h3>
                    </div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg></div>
                    <div class="stat-details">
                        <p class="stat-label">Departments</p>
                        <h3 class="stat-value" id="deptCount">0</h3>
                    </div>
                </div>
            </div>

            <div class="table-container glass-card">
                <div class="table-header">
                    <h2>Employee Roster</h2>
                    <div class="search-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="searchInput" placeholder="Search employees..." onkeyup="filterTable()">
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="employeeTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Department</th>
                                <th>Salary</th>
                                <th class="text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeeList">
                            <!-- Populated by JS -->
                            <tr><td colspan="5" class="text-center py-8">Loading employees...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Employee Modal -->
    <div id="addEmployeeModal" class="modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Employee</h2>
                <button class="close-btn" onclick="closeModal('addEmployeeModal')">&times;</button>
            </div>
            <form id="employeeForm" onsubmit="handleEmployeeSubmit(event)">
                <input type="hidden" id="employeeId">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="e.g. Jane Doe">
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" placeholder="e.g. Engineering">
                </div>
                <div class="form-group">
                    <label for="salary">Annual Salary ($)</label>
                    <input type="number" id="salary" placeholder="e.g. 75000">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addEmployeeModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Save Employee</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="/static/app.js"></script>
</body>
</html>
